    <script>
        // On long pages a vertical scrollbar eats a little viewport width, so
        // the centred header sits slightly left of where it lands on short
        // pages (no scrollbar) — enough to visibly jump when navigating.
        // Fix: on short pages only, nudge the header left by half the
        // scrollbar width so its centre matches the long-page layout.
        (function () {
            var header = document.querySelector("header");
            if (!header) return;
            function scrollbarWidth() {
                var probe = document.createElement("div");
                probe.style.cssText =
                    "position:absolute;top:-9999px;width:100px;height:100px;overflow:scroll";
                document.body.appendChild(probe);
                var w = probe.offsetWidth - probe.clientWidth;
                probe.remove();
                return w;
            }
            function align() {
                header.style.transform = "";
                var de = document.documentElement;
                var scrolls = de.scrollHeight > de.clientHeight;
                // only relevant on wide screens where the header is centred
                var wide = window.matchMedia("(min-width: 46rem)").matches;
                if (!scrolls && wide) {
                    header.style.transform =
                        "translateX(-" + scrollbarWidth() / 2 + "px)";
                }
            }
            align();
            window.addEventListener("resize", align);
        })();
    </script>
    <script>
        (function () {
            var openings = ["java-tainted developer", "maybe a witch", "not a robot", "well-meaning", "indoor person"];
            var middles = ["linguist rising", "aspiring cat lady", "sims player", "soup enthusiast", "ocaml noob", "food motivated"];
            var endings = ["occasional tea drinker", "coffee addict", "likes pickles", "sings to herself", "somewhat swashbuckling", "wears funny earrings"];
            function pick(list) {
                return list[Math.floor(Math.random() * list.length)];

            document.getElementById("footer-quote").textContent =
                [pick(openings), pick(middles), pick(endings)].join(", ");
