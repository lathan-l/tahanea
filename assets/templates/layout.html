<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header>
        <h1><a href="/index.html">tahanea</a></h1>
    </header>
    {{safe (yocaml_body) }}
    <footer>
        <p id="footer-quote"></p>
        <p>copyright 2026, created with
            <a href="https://yocaml.github.io/tutorial/">YOCaml</a>
            and a bit of help from Claude to write awful CSS
        </p>
    </footer>
    <script>
        (function () {
            var openings = ["java-tainted developer", "could-be witch", "not a robot, well-meaning"];
            var middles = ["linguist rising", "aspiring cat lady", "sims player", "soup enthusiast", "ocaml noob"];
            var endings = ["occasional tea drinker", "coffee addict", "likes pickles", "designated drinker"];
            function pick(list) {
                return list[Math.floor(Math.random() * list.length)];
            }
            document.getElementById("footer-quote").textContent =
                [pick(openings), pick(middles), pick(endings)].join(", ");
        })();
    </script>
</body>

</html>
